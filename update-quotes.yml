name: Update delayed stock quotes

on:
  schedule:
    - cron: "*/5 * * * 1-5"
    - cron: "30 6 * * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-quotes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: delayed-stock-quotes
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch latest quotes
        run: python scripts/update_quotes.py
      - name: Commit updated quote file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/quotes.json
          git diff --cached --quiet || git commit -m "Update delayed stock quotes"
          git push

  scan-twse-technology:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 6 * * * 1-5'
    needs: update-quotes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scan TWSE technology stocks
        run: python scripts/scan_twse.py
      - name: Commit opportunity radar data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/twse_history.json data/tw_opportunities.json
          git diff --cached --quiet || git commit -m "Update Taiwan technology opportunity radar"
          git push
