name: Update delayed stock quotes

on:
  schedule:
    - cron: "*/5 * * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-quotes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch latest quotes
        run: python scripts/update_quotes.py
      - name: Commit updated quotes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/quotes.json
          git diff --cached --quiet || git commit -m "Update delayed stock quotes"
          git pull --rebase origin main
          git push origin main
