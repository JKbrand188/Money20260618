name: Scan Taiwan technology opportunities

on:
  schedule:
    - cron: "30 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan-twse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scan TWSE technology stocks
        run: python scripts/scan_twse.py
      - name: Commit opportunity radar data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/twse_history.json data/tw_opportunities.json
          git diff --cached --quiet || git commit -m "Update Taiwan opportunity radar"
          git push
